services:
  postgres-gray:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aichat_gray
      POSTGRES_PASSWORD: aichat_gray
      POSTGRES_DB: aichat_gray
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aichat_gray -d aichat_gray']
      interval: 5s
      timeout: 5s
      retries: 10

  redis-gray:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
